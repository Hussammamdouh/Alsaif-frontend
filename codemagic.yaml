# Codemagic CI/CD configuration for Elsaif Analysis
# Documentation: https://docs.codemagic.io/yaml-basic-configuration/yaml-getting-started/

workflows:
  ios-simulator:
    name: Elsaif iOS Simulator Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "AlsaifAnalysis.xcworkspace"
        XCODE_SCHEME: "AlsaifAnalysis"
        API_BASE_URL: "https://api.alsaifanalysis.com"
        API_TIMEOUT: "30000"
        ENABLE_LOGGING: "false"
        LOG_LEVEL: "error"
        EXPO_PUBLIC_ONESIGNAL_APP_ID: "43486064-cce9-4d0f-a006-8145e4a29e8d"
    scripts:
      - name: Create environment configuration
        script: |
          echo "API_BASE_URL=$API_BASE_URL" > .env
          echo "API_TIMEOUT=$API_TIMEOUT" >> .env
          echo "ENABLE_LOGGING=$ENABLE_LOGGING" >> .env
          echo "LOG_LEVEL=$LOG_LEVEL" >> .env
          echo "EXPO_PUBLIC_ONESIGNAL_APP_ID=$EXPO_PUBLIC_ONESIGNAL_APP_ID" >> .env
      - name: Install npm dependencies
        script: |
          npm install
      - name: Run Expo Prebuild
        script: |
          npx expo prebuild --platform ios --no-install
      - name: Configure Podfile for Xcode 16 Compatibility
        script: |
          cat << 'EOF' > configure_podfile.rb
          content = File.read('ios/Podfile')
          # Add specific modular headers for Firebase & Google Utilities pods
          firebase_pods = "target 'AlsaifAnalysis' do\n  pod 'Firebase', :modular_headers => true\n  pod 'FirebaseCore', :modular_headers => true\n  pod 'FirebaseCoreInternal', :modular_headers => true\n  pod 'GoogleUtilities', :modular_headers => true\n  pod 'FirebaseCoreExtension', :modular_headers => true\n  pod 'FirebaseMessaging', :modular_headers => true\n  pod 'PromisesObjC', :modular_headers => true"
          content.gsub!("target 'AlsaifAnalysis' do", firebase_pods)

          # Force c++17 standard for fmt pod due to Xcode 16 compilation bug
          content.gsub!(/(react_native_post_install\s*\(\s*(\w+)[\s\S]*?,\s*\n\s*\))/, "\\1\n    \\2.pods_project.targets.each { |t| t.build_configurations.each { |c| c.build_settings['CLANG_CXX_LANGUAGE_STANDARD'] = 'gnu++17' if t.name.downcase.include?('fmt') } }")
          File.write('ios/Podfile', content)
          EOF
          ruby configure_podfile.rb
          rm configure_podfile.rb
          echo "=== CONFIGURED PODFILE ==="
          cat ios/Podfile
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod repo update
          CURRENT_ARCH=arm64 pod install --repo-update
      - name: Build app for iOS Simulator
        script: |
          xcodebuild build \
            -workspace "ios/$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -derivedDataPath build \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - build/Build/Products/Release-iphonesimulator/*.app

  android-simulator:
    name: Elsaif Android Simulator Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      node: latest
      vars:
        PACKAGE_NAME: "com.elsaifanalysis.app"
        API_BASE_URL: "https://api.alsaifanalysis.com"
        API_TIMEOUT: "30000"
        ENABLE_LOGGING: "false"
        LOG_LEVEL: "error"
        EXPO_PUBLIC_ONESIGNAL_APP_ID: "43486064-cce9-4d0f-a006-8145e4a29e8d"
    scripts:
      - name: Create environment configuration
        script: |
          echo "API_BASE_URL=$API_BASE_URL" > .env
          echo "API_TIMEOUT=$API_TIMEOUT" >> .env
          echo "ENABLE_LOGGING=$ENABLE_LOGGING" >> .env
          echo "LOG_LEVEL=$LOG_LEVEL" >> .env
          echo "EXPO_PUBLIC_ONESIGNAL_APP_ID=$EXPO_PUBLIC_ONESIGNAL_APP_ID" >> .env
      - name: Install npm dependencies
        script: |
          npm install
      - name: Run Expo Prebuild
        script: |
          npx expo prebuild --platform android --no-install
      - name: Set Android SDK location
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Build Android Release APK (signed with debug keystore)
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk

  ios-production:
    name: Elsaif iOS App Store Production Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: "Codemagic CI"
    environment:
      node: latest
      xcode: latest
      cocoapods: default
      groups:
        - apple-credentials
      vars:
        XCODE_WORKSPACE: "AlsaifAnalysis.xcworkspace"
        XCODE_SCHEME: "AlsaifAnalysis"
        BUNDLE_ID: "com.alsaifanalysis.com"
        API_BASE_URL: "https://api.alsaifanalysis.com"
        API_TIMEOUT: "30000"
        ENABLE_LOGGING: "false"
        LOG_LEVEL: "error"
        EXPO_PUBLIC_ONESIGNAL_APP_ID: "43486064-cce9-4d0f-a006-8145e4a29e8d"
    scripts:
      - name: Create environment configuration
        script: |
          echo "API_BASE_URL=$API_BASE_URL" > .env
          echo "API_TIMEOUT=$API_TIMEOUT" >> .env
          echo "ENABLE_LOGGING=$ENABLE_LOGGING" >> .env
          echo "LOG_LEVEL=$LOG_LEVEL" >> .env
          echo "EXPO_PUBLIC_ONESIGNAL_APP_ID=$EXPO_PUBLIC_ONESIGNAL_APP_ID" >> .env
      - name: Install npm dependencies
        script: |
          npm install
      - name: Run Expo Prebuild
        script: |
          npx expo prebuild --platform ios --no-install
      - name: Configure Podfile for Xcode 16 Compatibility
        script: |
          cat << 'EOF' > configure_podfile.rb
          content = File.read('ios/Podfile')
          firebase_pods = "target 'AlsaifAnalysis' do\n  pod 'Firebase', :modular_headers => true\n  pod 'FirebaseCore', :modular_headers => true\n  pod 'FirebaseCoreInternal', :modular_headers => true\n  pod 'GoogleUtilities', :modular_headers => true\n  pod 'FirebaseCoreExtension', :modular_headers => true\n  pod 'FirebaseMessaging', :modular_headers => true\n  pod 'PromisesObjC', :modular_headers => true"
          content.gsub!("target 'AlsaifAnalysis' do", firebase_pods)
          content.gsub!(/(react_native_post_install\s*\(\s*(\w+)[\s\S]*?,\s*\n\s*\))/, "\\1\n    \\2.pods_project.targets.each { |t| t.build_configurations.each { |c| c.build_settings['CLANG_CXX_LANGUAGE_STANDARD'] = 'gnu++17' if t.name.downcase.include?('fmt') } }")
          File.write('ios/Podfile', content)
          EOF
          ruby configure_podfile.rb
          rm configure_podfile.rb
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod repo update
          CURRENT_ARCH=arm64 pod install --repo-update
      - name: Set up Keychain for Code Signing
        script: |
          keychain initialize
      - name: Decode Apple Distribution Certificate
        script: |
          python3 -c "
          import os, base64
          print('--- Environment check ---')
          print('Available CM_ variables:', [k for k in os.environ if k.startswith('CM_')])
          cert_base64 = os.environ.get('CM_CERTIFICATE')
          if not cert_base64:
              print('ERROR: CM_CERTIFICATE environment variable is missing or empty!')
              print('Please check that CM_CERTIFICATE is added to the apple-credentials environment group in Codemagic.')
              exit(1)
          
          # Clean whitespaces/newlines from base64 string
          cert_base64 = cert_base64.strip().replace('\n', '').replace('\r', '')
          
          try:
              cert_bytes = base64.b64decode(cert_base64)
              print(f'Successfully decoded base64. Decoded size: {len(cert_bytes)} bytes')
          except Exception as e:
              print(f'ERROR: Failed to decode base64 string: {e}')
              exit(1)
              
          if len(cert_bytes) == 0:
              print('ERROR: Decoded certificate bytes are empty!')
              exit(1)
              
          target_path = '/tmp/certificate.p12'
          try:
              with open(target_path, 'wb') as f:
                  f.write(cert_bytes)
              print(f'Successfully wrote certificate to {target_path}')
          except Exception as e:
              print(f'ERROR: Failed to write to {target_path}: {e}')
              exit(1)
          "
      - name: Apply Signing Certificates
        script: |
          if [ -z "${CM_CERTIFICATE_PASSWORD}" ]; then
            echo "Applying certificate without password"
            keychain add-certificates --certificate /tmp/certificate.p12
          else
            echo "Applying certificate with password"
            keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "${CM_CERTIFICATE_PASSWORD}"
          fi
      - name: Fetch Apple Certificates & Profiles
        script: |
          if openssl pkcs12 -in /tmp/certificate.p12 -nodes -nocerts -out /tmp/certificate_key_raw.pem -passin pass:"${CM_CERTIFICATE_PASSWORD}" 2>/dev/null; then
            echo "Private key extracted raw"
          else
            echo "Retrying key extraction raw with legacy providers..."
            openssl pkcs12 -in /tmp/certificate.p12 -nodes -nocerts -out /tmp/certificate_key_raw.pem -passin pass:"${CM_CERTIFICATE_PASSWORD}" -provider legacy -provider default
          fi
          python3 -c "
          import pathlib
          raw = pathlib.Path('/tmp/certificate_key_raw.pem').read_text()
          idx = raw.find('-----BEGIN')
          if idx != -1:
              pathlib.Path('/tmp/certificate_key.pem').write_text(raw[idx:])
              print('Successfully cleaned private key headers.')
          else:
              print('ERROR: No private key block found in raw file!')
              exit(1)
          "
          # Fetch signing files for main App Bundle ID
          app-store-connect fetch-signing-files "com.alsaifanalysis.com" --type IOS_APP_STORE --create --certificate-key=@file:/tmp/certificate_key.pem
          # Fetch signing files for OneSignal Notification Service Extension Bundle ID
          app-store-connect fetch-signing-files "com.alsaifanalysis.com.OneSignalNotificationServiceExtension" --type IOS_APP_STORE --create --certificate-key=@file:/tmp/certificate_key.pem
          # Fetch signing files for iOS Widget Extension Bundle ID
          app-store-connect fetch-signing-files "com.alsaifanalysis.com.widget" --type IOS_APP_STORE --create --certificate-key=@file:/tmp/certificate_key.pem
      - name: Set up Code Signing on Xcode Project
        script: |
          xcode-project use-profiles --project ios/AlsaifAnalysis.xcodeproj
      - name: Build App Store Archive
        script: |
          build-number --xcode
          xcodebuild archive \
            -workspace "ios/$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "ios/build/AlsaifAnalysis.xcarchive"
      - name: Export IPA for Distribution
        script: |
          xcodebuild -exportArchive \
            -archivePath "ios/build/AlsaifAnalysis.xcarchive" \
            -exportOptionsPlist "/Users/builder/export_options.plist" \
            -exportPath ios/build
    artifacts:
      - ios/build/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

